<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nile AI Study Buddy</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --navy: #1a237e;
            --navy-light: #283593;
            --gold: #c9a227;
            --gold-light: #e6c35c;
            --sand: #F5E6D3;
            --white: #ffffff;
            --gray-100: #f5f5f5;
            --gray-200: #e5e5e5;
            --gray-600: #666666;
            --gray-800: #333333;
            --error: #ff4444;
            --success: #4CAF50;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(180deg, var(--white) 0%, var(--gray-100) 100%);
            min-height: 100vh;
        }
        
        .header {
            background: var(--navy);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(26, 35, 126, 0.3);
        }
        
        .header-left { display: flex; align-items: center; gap: 1rem; }
        .logo { height: 40px; background: var(--white); padding: 4px; border-radius: 8px; }
        .header-title { color: var(--white); font-weight: 600; }
        
        .new-chat-btn {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            background: linear-gradient(135deg, var(--gold), var(--gold-light));
            color: var(--navy);
            border: 2px solid var(--white);
            padding: 0.5rem 1.25rem;
            border-radius: 40px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            animation: glowPulse 2s infinite;
        }
        
        @keyframes glowPulse {
            0% { box-shadow: 0 0 0 0 rgba(201, 162, 39, 0.6); }
            70% { box-shadow: 0 0 0 8px rgba(201, 162, 39, 0); }
            100% { box-shadow: 0 0 0 0 rgba(201, 162, 39, 0); }
        }
        
        .new-chat-btn:hover { transform: scale(1.05); }
        
        .nav-pills {
            position: fixed;
            top: 5rem;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 0.5rem;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            padding: 0.5rem;
            border-radius: 50px;
            box-shadow: 0 4px 20px rgba(26, 35, 126, 0.15);
            z-index: 99;
        }
        
        .nav-pill {
            padding: 0.6rem 1.25rem;
            border-radius: 25px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
        }
        
        .nav-pill:hover { background: var(--sand); }
        .nav-pill.active { background: var(--navy); color: var(--gold); }
        
        .main { max-width: 900px; margin: 0 auto; padding: 8rem 1.5rem 2rem; }
        
        .welcome { text-align: center; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .welcome h1 { font-family: 'Space Grotesk', sans-serif; font-size: 3rem; color: var(--navy); margin-bottom: 1rem; }
        .welcome p { color: var(--gray-600); }
        
        .orbital-input {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: var(--white);
            border-top: 1px solid var(--gray-200);
            padding: 1.5rem;
            z-index: 100;
        }
        
        .input-container { max-width: 800px; margin: 0 auto; }
        
        .input-core {
            background: var(--gray-100);
            border: 2px solid var(--navy);
            border-radius: 20px;
            padding: 0.75rem;
            display: flex;
            gap: 0.75rem;
            transition: all 0.3s;
        }
        
        .input-core:focus-within { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201, 162, 39, 0.2); }
        
        .message-input {
            flex: 1;
            padding: 0.5rem;
            border: none;
            background: transparent;
            font-family: inherit;
            font-size: 1rem;
            resize: none;
            outline: none;
        }
        
        .send-orb {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--navy), var(--navy-light));
            color: var(--gold);
            border: none;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .send-orb:hover:not(:disabled) { transform: scale(1.1); background: linear-gradient(135deg, var(--gold), var(--gold-light)); color: var(--navy); }
        .send-orb:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .chat-stream {
            display: none;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 180px;
        }
        
        .chat-stream.show { display: flex; }
        
        .stream-bubble {
            display: flex;
            gap: 1rem;
            max-width: 85%;
            animation: slideIn 0.3s ease-out;
        }
        
        @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .stream-bubble.user { align-self: flex-end; flex-direction: row-reverse; }
        .stream-bubble.ai { align-self: flex-start; }
        
        .bubble-avatar {
            width: 40px;
            height: 40px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .stream-bubble.user .bubble-avatar { background: var(--navy); color: var(--gold); font-weight: bold; }
        .stream-bubble.ai .bubble-avatar { background: var(--white); border: 2px solid var(--gold); overflow: hidden; }
        .bubble-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .bubble-content {
            padding: 1rem 1.25rem;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 0.95rem;
        }
        
        .stream-bubble.user .bubble-content { background: var(--navy); color: var(--white); border-bottom-right-radius: 4px; }
        .stream-bubble.ai .bubble-content { background: var(--white); border: 1px solid var(--gray-200); border-bottom-left-radius: 4px; }
        
        /* Typing animation cursor */
        .typing-cursor {
            display: inline-block;
            width: 2px;
            height: 1.2em;
            background-color: var(--gold);
            margin-left: 2px;
            animation: blink 1s step-end infinite;
            vertical-align: middle;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
        
        /* Quiz Styles */
        .quiz-question {
            background: var(--gray-100);
            border-radius: 16px;
            padding: 1.25rem;
            margin-bottom: 1.25rem;
            border-left: 4px solid var(--gold);
        }
        
        .question-text {
            font-size: 1rem;
            font-weight: 600;
            color: var(--navy);
            margin-bottom: 1rem;
        }
        
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin: 1rem 0;
        }
        
        .quiz-option {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 1rem;
            background: var(--white);
            border: 2px solid var(--gray-200);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quiz-option:hover { border-color: var(--gold); transform: translateX(4px); }
        .quiz-option.selected { border-color: var(--navy); background: var(--navy); color: var(--white); }
        .quiz-option.correct { border-color: var(--success); background: #e8f5e9; }
        .quiz-option.wrong { border-color: var(--error); background: #ffebee; }
        
        .option-letter {
            font-weight: 700;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--gray-100);
            border-radius: 8px;
        }
        
        .feedback {
            margin-top: 0.75rem;
            padding: 0.6rem;
            border-radius: 8px;
            font-size: 0.85rem;
            display: none;
        }
        
        .feedback.show { display: block; }
        .feedback.correct { background: #e8f5e9; color: #2e7d32; }
        .feedback.incorrect { background: #ffebee; color: #c62828; }
        
        .quiz-score {
            background: var(--navy);
            color: var(--gold);
            padding: 0.6rem 1rem;
            border-radius: 12px;
            text-align: center;
            margin-top: 1rem;
            font-weight: 700;
        }
        
        .thinking-orb {
            display: none;
            align-self: flex-start;
            padding: 0.75rem 1.25rem;
            background: var(--white);
            border-radius: 20px;
            border: 1px solid var(--gray-200);
            gap: 0.75rem;
        }
        
        .thinking-orb.show { display: flex; }
        
        .pulse-dots { display: flex; gap: 6px; align-items: center; }
        .pulse-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--gold);
            animation: bounce 1.4s infinite;
        }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        
        .pulse-dot:nth-child(2) { animation-delay: 0.2s; }
        .pulse-dot:nth-child(3) { animation-delay: 0.4s; }
        
        @media (max-width: 768px) {
            .nav-pills { top: 4.5rem; width: calc(100% - 2rem); overflow-x: auto; justify-content: center; }
            .welcome h1 { font-size: 2rem; }
            .stream-bubble { max-width: 95%; }
            .new-chat-btn { padding: 0.4rem 1rem; font-size: 0.8rem; }
        }
    </style>
    <script src='https://cdn.jsdelivr.net/npm/marked/marked.min.js'></script>
</head>
<body>
    <header class="header">
        <div class="header-left">
            <img src="https://cdn.punchng.com/wp-content/uploads/2021/06/24125436/Nile-University-logo1.jpg" class="logo">
            <span class="header-title">AI Study Buddy</span>
            <button class="new-chat-btn" onclick="newChat()">✨ New Chat +</button>
        </div>
        <div class="header-right">
            <span id="statusText">● Online</span>
        </div>
    </header>
    
    <div class="nav-pills">
        <button class="nav-pill active" onclick="setMode('explain')">📚 Explain</button>
        <button class="nav-pill" onclick="setMode('summarize')">📝 Summarize</button>
        <button class="nav-pill" onclick="setMode('quiz')">❓ Quiz</button>
    </div>

    <main class="main">
        <div class="welcome" id="welcomeSection">
            <h1>Hello, Nile Student! 👋</h1>
            <p>Upload notes or ask questions — get explanations, summaries, and interactive quizzes.</p>
        </div>
        <div class="chat-stream" id="chatStream"></div>
        <div class="thinking-orb" id="thinkingOrb">
            <div class="pulse-dots">
                <div class="pulse-dot"></div>
                <div class="pulse-dot"></div>
                <div class="pulse-dot"></div>
            </div>
            <span>AI is thinking...</span>
        </div>
    </main>

    <div class="orbital-input">
        <div class="input-container">
            <div class="input-core">
                <textarea class="message-input" id="messageInput" placeholder="Ask a question or paste study notes..." rows="1"></textarea>
                <button class="send-orb" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
            <p style="font-size: 0.7rem; text-align: center; margin-top: 0.5rem; color: var(--gray-600);">AI can make mistakes. Verify important information.</p>
        </div>
    </div>

    <script>
        let currentMode = 'explain';
        let isProcessing = false;
        let currentQuizData = null;
        
        const messageInput = document.getElementById('messageInput');
        const welcomeSection = document.getElementById('welcomeSection');
        const chatStream = document.getElementById('chatStream');
        const thinkingOrb = document.getElementById('thinkingOrb');
        const sendBtn = document.getElementById('sendBtn');
        
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 150) + 'px';
        });
        
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });
        
        function setMode(mode) {
            currentMode = mode;
            document.querySelectorAll('.nav-pill').forEach((pill, idx) => {
                const modes = ['explain', 'summarize', 'quiz'];
                pill.classList.toggle('active', modes[idx] === mode);
            });
        }
        
        async function sendMessage() {
            const text = messageInput.value.trim();
            if (!text || isProcessing) return;
            
            // Display user message
            welcomeSection.style.display = 'none';
            chatStream.classList.add('show');
            displayBubble('user', text);
            
            messageInput.value = '';
            messageInput.style.height = 'auto';
            isProcessing = true;
            sendBtn.disabled = true;
            thinkingOrb.classList.add('show');
            
            // Scroll to bottom
            window.scrollTo(0, document.body.scrollHeight);
            
            try {
                const response = await fetch('/.netlify/functions/explain', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        text: text,
                        mode: currentMode,
                        fileContents: []
                    })
                });
                
                const data = await response.json();
                thinkingOrb.classList.remove('show');
                
                if (data.error) throw new Error(data.error);
                
                // For quiz mode, render interactive quiz
                if (currentMode === 'quiz') {
                    displayInteractiveQuiz(data.result);
                } else {
                    // Display with typing animation
                    await displayWithTypingAnimation(data.result);
                }
                
            } catch (err) {
                thinkingOrb.classList.remove('show');
                await displayWithTypingAnimation(`❌ Error: ${err.message}`);
            } finally {
                isProcessing = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }
        
        async function displayWithTypingAnimation(content) {
            return new Promise((resolve) => {
                const bubble = document.createElement('div');
                bubble.className = 'stream-bubble ai';
                
                const avatar = '<div class="bubble-avatar"><img src="https://cdn.punchng.com/wp-content/uploads/2021/06/24125436/Nile-University-logo1.jpg"></div>';
                const contentDiv = document.createElement('div');
                contentDiv.className = 'bubble-content';
                
                bubble.innerHTML = avatar;
                bubble.appendChild(contentDiv);
                chatStream.appendChild(bubble);
                
                let i = 0;
                const htmlContent = marked.parse(content);
                const tempDiv = document.createElement('div');
                tempDiv.innerHTML = htmlContent;
                const plainText = tempDiv.textContent || tempDiv.innerText || content;
                
                contentDiv.innerHTML = '';
                const cursor = document.createElement('span');
                cursor.className = 'typing-cursor';
                contentDiv.appendChild(cursor);
                
                function typeNext() {
                    if (i < plainText.length) {
                        const char = plainText[i];
                        if (char === '\n') {
                            contentDiv.insertBefore(document.createElement('br'), cursor);
                        } else {
                            contentDiv.insertBefore(document.createTextNode(char), cursor);
                        }
                        i++;
                        setTimeout(typeNext, 15 + Math.random() * 10);
                    } else {
                        cursor.remove();
                        contentDiv.innerHTML = marked.parse(content);
                        resolve();
                        window.scrollTo(0, document.body.scrollHeight);
                    }
                    window.scrollTo(0, document.body.scrollHeight);
                }
                
                typeNext();
            });
        }
        
        function displayBubble(role, content) {
            const bubble = document.createElement('div');
            bubble.className = `stream-bubble ${role}`;
            
            const avatar = role === 'user' ? '<div class="bubble-avatar">You</div>' : '<div class="bubble-avatar"><img src="https://cdn.punchng.com/wp-content/uploads/2021/06/24125436/Nile-University-logo1.jpg"></div>';
            const contentDiv = document.createElement('div');
            contentDiv.className = 'bubble-content';
            contentDiv.innerHTML = marked.parse(content);
            
            bubble.innerHTML = avatar;
            bubble.appendChild(contentDiv);
            chatStream.appendChild(bubble);
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        function displayInteractiveQuiz(quizText) {
            const questions = parseQuizQuestions(quizText);
            
            if (!questions || questions.length === 0) {
                displayWithTypingAnimation(quizText);
                return;
            }
            
            currentQuizData = questions;
            
            const quizContainer = document.createElement('div');
            quizContainer.className = 'stream-bubble ai';
            
            let score = 0;
            let answeredCount = 0;
            
            let questionsHtml = '';
            questions.forEach((q, idx) => {
                questionsHtml += `
                    <div class="quiz-question" id="quiz-q-${idx}">
                        <div class="question-text">${idx + 1}. ${escapeHtml(q.question)}</div>
                        <div class="quiz-options" id="quiz-options-${idx}">
                            ${q.options.map((opt, optIdx) => `
                                <div class="quiz-option" data-q="${idx}" data-opt="${String.fromCharCode(65 + optIdx)}" data-correct="${q.correct}">
                                    <span class="option-letter">${String.fromCharCode(65 + optIdx)}</span>
                                    <span>${escapeHtml(opt)}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="feedback" id="feedback-${idx}"></div>
                    </div>
                `;
            });
            
            quizContainer.innerHTML = `
                <div class="bubble-avatar"><img src="https://cdn.punchng.com/wp-content/uploads/2021/06/24125436/Nile-University-logo1.jpg"></div>
                <div class="bubble-content">
                    <h3>📝 Quiz Mode</h3>
                    <p>Click on an option to answer. Instant feedback + corrections!</p>
                    ${questionsHtml}
                    <div class="quiz-score" id="quiz-score-display">Score: 0/${questions.length}</div>
                    <button onclick="showQuizResults()" style="margin-top: 1rem; padding: 0.5rem 1rem; background: var(--navy); color: var(--gold); border: none; border-radius: 8px; cursor: pointer;">📊 Show Results & Corrections</button>
                </div>
            `;
            
            chatStream.appendChild(quizContainer);
            
            // Add event listeners
            questions.forEach((q, idx) => {
                const options = document.querySelectorAll(`#quiz-options-${idx} .quiz-option`);
                options.forEach(opt => {
                    opt.addEventListener('click', () => {
                        if (opt.classList.contains('selected')) return;
                        
                        const selectedLetter = opt.dataset.opt;
                        const correctLetter = q.correct;
                        const isCorrect = (selectedLetter === correctLetter);
                        
                        opt.classList.add('selected');
                        
                        const feedbackDiv = document.getElementById(`feedback-${idx}`);
                        if (isCorrect) {
                            score++;
                            feedbackDiv.innerHTML = `✅ Correct! ${q.explanation || 'Good job!'}`;
                            feedbackDiv.className = 'feedback show correct';
                            opt.classList.add('correct');
                        } else {
                            feedbackDiv.innerHTML = `❌ Incorrect. Correct answer is ${correctLetter}. ${q.explanation || ''}`;
                            feedbackDiv.className = 'feedback show incorrect';
                            opt.classList.add('wrong');
                            
                            const correctOpt = document.querySelector(`#quiz-options-${idx} .quiz-option[data-opt="${correctLetter}"]`);
                            if (correctOpt) correctOpt.classList.add('correct');
                        }
                        
                        answeredCount++;
                        document.getElementById('quiz-score-display').innerHTML = `Score: ${score}/${questions.length}`;
                        
                        document.querySelectorAll(`#quiz-options-${idx} .quiz-option`).forEach(opt => {
                            opt.style.pointerEvents = 'none';
                        });
                    });
                });
            });
            
            window.scrollTo(0, document.body.scrollHeight);
        }
        
        function parseQuizQuestions(quizText) {
            const questions = [];
            const lines = quizText.split('\n');
            
            let currentQuestion = null;
            let options = [];
            let correct = null;
            let explanation = '';
            
            for (let i = 0; i < lines.length; i++) {
                const line = lines[i].trim();
                
                const questionMatch = line.match(/^(\d+)\.\s*(.+)/);
                if (questionMatch) {
                    if (currentQuestion && options.length > 0) {
                        questions.push({
                            question: currentQuestion,
                            options: [...options],
                            correct: correct || 'A',
                            explanation: explanation || 'Review the material.'
                        });
                    }
                    currentQuestion = questionMatch[2];
                    options = [];
                    correct = null;
                    explanation = '';
                }
                else if (line.match(/^[A-D]\.\s/)) {
                    const optionText = line.substring(3).trim();
                    options.push(optionText);
                }
                else if (line.toLowerCase().includes('correct answer')) {
                    const match = line.match(/[A-D]/i);
                    if (match) correct = match[0].toUpperCase();
                }
                else if (line.toLowerCase().includes('explanation')) {
                    explanation = line.replace(/explanation:?\s*/i, '');
                }
                else if (currentQuestion && line && !line.match(/^\d+\./) && !line.match(/^[A-D]\./)) {
                    if (!explanation && line.length > 5) {
                        explanation = line;
                    }
                }
            }
            
            if (currentQuestion && options.length > 0) {
                questions.push({
                    question: currentQuestion,
                    options: options,
                    correct: correct || 'A',
                    explanation: explanation || 'Review the material.'
                });
            }
            
            return questions;
        }
        
        function showQuizResults() {
            if (!currentQuizData) return;
            
            let resultsHtml = '<h3>📊 Quiz Results Summary</h3><ul style="margin-left: 1.5rem;">';
            currentQuizData.forEach((q, idx) => {
                resultsHtml += `<li style="margin-bottom: 1rem;"><strong>Q${idx + 1}:</strong> ${q.question.substring(0, 100)}...<br>`;
                resultsHtml += `<span style="color: #2e7d32;">✅ Correct answer: ${q.correct}</span><br>`;
                resultsHtml += `<span style="color: var(--gray-600);">📖 ${q.explanation}</span></li>`;
            });
            resultsHtml += '</ul>';
            
            displayWithTypingAnimation(resultsHtml);
        }
        
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        function newChat() {
            chatStream.innerHTML = '';
            chatStream.classList.remove('show');
            welcomeSection.style.display = 'block';
            messageInput.value = '';
            currentQuizData = null;
            messageInput.focus();
        }
        
        // Auto-focus on load
        messageInput.focus();
    </script>
</body>
</html>
